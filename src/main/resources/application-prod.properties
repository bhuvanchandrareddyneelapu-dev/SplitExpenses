# ============================================================
# SplitWiseMoney — Production Configuration (Railway)
# ============================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod  (set in Procfile)
# ============================================================

# PostgreSQL Database
# DATABASE_URL is intercepted and rewritten by RailwayEnvironmentPostProcessor
# which converts postgresql:// → jdbc:postgresql:// before Hikari initialises.
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ────────────────────────────────────────────────
# Railway free-tier PostgreSQL allows 25 total connections.
# This service gets 5 max so other tooling/admin connections still fit.
# keepalive-time validates connections every 30 s to prevent stale connections
# being returned when Railway's network layer silently drops idle TCP connections.
spring.datasource.hikari.pool-name=SplitWiseHikari
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1
# Warn in logs when a connection is held for more than 60 s (likely a leak)
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / Hibernate — override H2 base-profile settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway — uses auto-configured data source
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security — Set JWT_SECRET in Railway Variables tab
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Port — Railway injects PORT automatically
server.port=${PORT:8080}

# ── Graceful Shutdown ────────────────────────────────────────────────────────
# Allows in-flight requests up to 30 s to complete before the process exits.
# Prevents incomplete transactions and dirty connection returns on Railway restarts.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Swagger — disable in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN
# DEBUG during email diagnosis — revert to INFO once delivery confirmed
logging.level.com.splitwisemoney=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
# HikariCP pool metrics — INFO shows pool health, size, wait times
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=INFO

# ── Mail (production) ────────────────────────────────────────────────────────
# MAIL_USERNAME and MAIL_PASSWORD must be set as Railway environment variables.
# Flexible MAIL_HOST and MAIL_PORT support switching to Brevo/SendGrid/SES or SMTPS (Port 465).
spring.mail.enabled=true
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:*}

# SMTP Timeouts — critical for Railway's ephemeral containers.
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


# ── Mail debug logging ───────────────────────────────────────────────────────
# DISABLED in production — JavaMail debug prints the full SMTP conversation
# (EHLO, AUTH, DATA) for every email which creates massive log volume.
# Set to true temporarily only when diagnosing SMTP failures.
spring.mail.properties.mail.debug=false
logging.level.org.springframework.mail=WARN
logging.level.org.springframework.mail.javamail=WARN
logging.level.org.eclipse.angus.mail=WARN

# ── Spring Boot Actuator ─────────────────────────────────────────────────────
# Exposes /actuator/health for Railway's health check probe.
# Only health and info are exposed — metrics/env/beans are NOT exposed for security.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
