# ============================================================
# SplitWiseMoney — Production Configuration (Railway)
# ============================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ALL values come from Railway environment variables.
# No localhost, no hardcoded secrets, no hardcoded ports.
# ============================================================

# PostgreSQL Database — set via Railway environment variables
# Note: DataSourceConfig.java normalises postgresql:// → jdbc:postgresql://
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — override H2 base-profile settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway — automatically uses spring.datasource.* from above
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security — MUST be set in Railway Variables tab
# Generate: openssl rand -hex 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Port — Railway injects PORT automatically
server.port=${PORT:8080}

# Swagger — disable in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging (production-level: minimal noise, app-level INFO)
logging.level.root=WARN
logging.level.com.splitwisemoney=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
