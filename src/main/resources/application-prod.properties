# ============================================================
# SplitWiseMoney — Production Configuration (Railway)
# ============================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ============================================================

# PostgreSQL Database (SPRING_DATASOURCE_URL is intercepted by RailwayEnvironmentPostProcessor)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — override H2 base-profile settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway — uses auto-configured data source
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security — Set JWT_SECRET in Railway Variables tab
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Port — Railway injects PORT automatically
server.port=${PORT:8080}

# Swagger — disable in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.splitwisemoney=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
