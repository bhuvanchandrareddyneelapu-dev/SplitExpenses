# ============================================================
# SplitWiseMoney — Production Configuration (Railway)
# ============================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ============================================================

# PostgreSQL Database (SPRING_DATASOURCE_URL is intercepted by RailwayEnvironmentPostProcessor)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — override H2 base-profile settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway — uses auto-configured data source
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security — Set JWT_SECRET in Railway Variables tab
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Port — Railway injects PORT automatically
server.port=${PORT:8080}

# Swagger — disable in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging
logging.level.root=WARN
# DEBUG during email diagnosis — revert to INFO once delivery confirmed
logging.level.com.splitwisemoney=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN

# ── Mail (production) ─────────────────────────────────────────────
# Explicitly enable mail so there is no ambiguity from base-profile inheritance.
# MAIL_USERNAME and MAIL_PASSWORD must be set as Railway environment variables.
spring.mail.enabled=true

# SMTP Timeouts — critical for Railway’s ephemeral containers
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Mail debug logging — set to DEBUG during initial investigation, INFO once confirmed
# Set to false / WARN once email delivery is verified working in production.
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=INFO
logging.level.org.springframework.mail.javamail=INFO
logging.level.org.eclipse.angus.mail=INFO
