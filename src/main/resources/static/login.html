<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SplitWiseMoney</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="navbar-brand navbar-brand-custom fs-2 text-decoration-none">
                        <i class="fa-solid fa-wallet me-2"></i>SplitWiseMoney
                    </a>
                </div>
                
                <div class="glass-card p-5">
                    <h3 class="text-center fw-bold mb-4">Welcome Back</h3>
                    
                    <!-- Alert Area -->
                    <div id="alertArea" class="d-none alert alert-danger border-0 text-white" style="background: var(--accent-rose); opacity: 0.9;"></div>
                    
                    <form id="loginForm">
                        <div class="mb-4">
                            <label for="email" class="form-label text-secondary">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text form-glass border-end-0 bg-transparent text-secondary"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control form-glass border-start-0" id="email" placeholder="name@example.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label for="password" class="form-label text-secondary">Password</label>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text form-glass border-end-0 bg-transparent text-secondary"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control form-glass border-start-0" id="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-glow w-100 py-3 mb-4">
                            <i class="fa-solid fa-sign-in me-2"></i>Sign In
                        </button>
                    </form>
                    
                    <p class="text-center mb-0 text-secondary">
                        Don't have an account? <a href="register.html" class="text-white fw-medium text-decoration-none">Create Account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Frontend API Connection -->
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertArea = document.getElementById('alertArea');
            
            alertArea.classList.add('d-none');
            
            try {
                const response = await API.post('/api/auth/login', { email, password }, false);
                if (response.token) {
                    API.setToken(response.token);
                    window.location.href = 'dashboard.html';
                } else {
                    alertArea.textContent = 'Invalid credentials response.';
                    alertArea.classList.remove('d-none');
                }
            } catch (err) {
                alertArea.textContent = err.message || 'Login failed. Please check your credentials.';
                alertArea.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
