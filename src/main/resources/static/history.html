<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity History - SplitWiseMoney</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="dashboard.html">
                <i class="fa-solid fa-wallet me-2"></i>SplitWiseMoney
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-chart-line me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="groups.html"><i class="fa-solid fa-users me-1"></i>Groups</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="history.html"><i class="fa-solid fa-history me-1"></i>Activity Log</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item me-3 position-relative">
                        <a class="nav-link" href="notifications.html">
                            <i class="fa-solid fa-bell fs-5"></i>
                            <span id="unreadNotificationBadge" class="badge-notify-count d-none">0</span>
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-circle-user fs-4 me-2"></i><span id="headerUserName">Profile</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary">
                            <li><a class="dropdown-item text-light" href="profile.html"><i class="fa-solid fa-user me-2"></i>My Profile</a></li>
                            <li><a class="dropdown-item text-light" href="settings.html"><i class="fa-solid fa-gear me-2"></i>Settings</a></li>
                            <li><hr class="dropdown-divider border-secondary"></li>
                            <li><a class="dropdown-item text-light" href="#" id="logoutLink"><i class="fa-solid fa-right-from-bracket me-2"></i>Sign Out</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="padding-top: 100px; padding-bottom: 50px;">
        <div class="row mb-5">
            <div class="col-12">
                <h2 class="fw-bold">Activity History</h2>
                <p class="text-secondary">Audit log of all actions taken in your groups.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-9 mx-auto">
                <div class="glass-card p-5">
                    <div id="historyLogsContainer" class="timeline-log">
                        <!-- Log timeline loaded dynamically -->
                        <div class="text-center py-5 text-secondary">
                            <i class="fa-solid fa-circle-notch fa-spin fs-2 mb-3"></i>
                            <p>Loading history...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div class="d-flex justify-content-between align-items-center mt-5">
                        <button class="btn btn-secondary-outline btn-sm" id="btnPrevHistoryPage" disabled>
                            <i class="fa-solid fa-chevron-left me-1"></i>Previous
                        </button>
                        <span class="text-secondary small" id="historyPaginationText">Page 1 of 1</span>
                        <button class="btn btn-secondary-outline btn-sm" id="btnNextHistoryPage" disabled>
                            Next<i class="fa-solid fa-chevron-right ms-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Frontend API Connection -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.initHistory();
        });
    </script>
</body>
</html>
