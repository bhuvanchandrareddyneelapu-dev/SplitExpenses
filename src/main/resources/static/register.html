<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SplitWiseMoney</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="navbar-brand navbar-brand-custom fs-2 text-decoration-none">
                        <i class="fa-solid fa-wallet me-2"></i>SplitWiseMoney
                    </a>
                </div>
                
                <div class="glass-card p-5">
                    <h3 class="text-center fw-bold mb-4">Create Account</h3>
                    
                    <!-- Alert Area -->
                    <div id="alertArea" class="d-none alert border-0 text-white" style="opacity: 0.9;"></div>
                    
                    <form id="registerForm">
                        <div class="mb-4">
                            <label for="fullName" class="form-label text-secondary">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text form-glass border-end-0 bg-transparent text-secondary"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control form-glass border-start-0" id="fullName" placeholder="Rahul Kumar" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label text-secondary">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text form-glass border-end-0 bg-transparent text-secondary"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control form-glass border-start-0" id="email" placeholder="rahul@example.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary">Password</label>
                            <div class="input-group">
                                <span class="input-group-text form-glass border-end-0 bg-transparent text-secondary"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control form-glass border-start-0" id="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-glow w-100 py-3 mb-4">
                            <i class="fa-solid fa-user-plus me-2"></i>Sign Up
                        </button>
                    </form>
                    
                    <p class="text-center mb-0 text-secondary">
                        Already have an account? <a href="login.html" class="text-white fw-medium text-decoration-none">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Frontend API Connection -->
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertArea = document.getElementById('alertArea');
            
            alertArea.classList.add('d-none');
            alertArea.className = 'alert border-0 text-white d-none';
            
            try {
                await API.post('/api/auth/register', { fullName, email, password }, false);
                
                alertArea.textContent = 'Account created successfully! Redirecting to login...';
                alertArea.style.backgroundColor = 'var(--accent-emerald)';
                alertArea.classList.remove('d-none');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                alertArea.textContent = err.message || 'Registration failed. Email may already be registered.';
                alertArea.style.backgroundColor = 'var(--accent-rose)';
                alertArea.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
