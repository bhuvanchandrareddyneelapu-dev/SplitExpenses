# ============================================================
# Local Development Configuration (H2 in-memory database)
# Active when: no profile set, or SPRING_PROFILES_ACTIVE=default
# ============================================================

# Server
server.port=8080

# H2 In-Memory Database (PostgreSQL compatibility mode for local dev)
spring.datasource.url=jdbc:h2:mem:splitwisedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# H2Dialect is auto-detected; explicit setting avoids deprecation warning
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable open-in-view — avoids lazy-load during view rendering
spring.jpa.open-in-view=false

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security Configurations
jwt.secret=9a4f2c8d3b7a1e5f8c6d4b2a9e7f3c1b5a8e2d4c7b9a1e3f5c7d9b2a4e6f8a1c9b3d5e7f1a2c4b6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c
jwt.expiration=86400000

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=DEBUG
# Application-level DEBUG — shows GroupService and EmailService trace logs
logging.level.com.splitwisemoney=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Application Base URL (for invitation email links)
app.base-url=http://localhost:8080

# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.enabled=true

# ── SMTP Timeouts (ms) — prevents silent hangs in containerised environments ──
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ── JavaMail / SMTP Full Debug Logging ──────────────────────────────────────
# Prints the complete SMTP conversation: EHLO, AUTH, 250 OK, 535, DATA, etc.
# Remove or set to false in production once email delivery is confirmed working.
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.mail.javamail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG
logging.level.com.sun.mail=DEBUG
