# ============================================================
# Local Development Configuration (H2 in-memory database)
# Active when: no profile set, or SPRING_PROFILES_ACTIVE=default
# ============================================================

# Server
server.port=8080

# H2 In-Memory Database (PostgreSQL compatibility mode for local dev)
spring.datasource.url=jdbc:h2:mem:splitwisedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# H2Dialect is auto-detected; explicit setting avoids deprecation warning
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable open-in-view — avoids lazy-load during view rendering
spring.jpa.open-in-view=false

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security Configurations
jwt.secret=9a4f2c8d3b7a1e5f8c6d4b2a9e7f3c1b5a8e2d4c7b9a1e3f5c7d9b2a4e6f8a1c9b3d5e7f1a2c4b6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c
jwt.expiration=86400000

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
