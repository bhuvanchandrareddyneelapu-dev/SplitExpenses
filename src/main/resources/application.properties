# Server configuration
server.port=8080

# Database Configuration (H2 memory DB for out-of-the-box running, PostgreSQL mode)
spring.datasource.url=jdbc:h2:mem:splitwisedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Security Configurations
jwt.secret=9a4f2c8d3b7a1e5f8c6d4b2a9e7f3c1b5a8e2d4c7b9a1e3f5c7d9b2a4e6f8a1c9b3d5e7f1a2c4b6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c6d8e0f2a4c
# JWT expiration (24 hours)
jwt.expiration=86400000

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=DEBUG

# Enable Swagger API docs resource path exposure
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
